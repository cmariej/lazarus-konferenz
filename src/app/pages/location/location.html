<app-hero
    title="Veranstaltungsort"
    [subtitle]="location.city">
</app-hero>

<section>

    <div class="container">

        <app-section
            eyebrow="Veranstaltungsort"
            [title]="location.location"
            subtitle="Ein Ort für Wissen und Networking">
        </app-section>

        <div class="location-grid">

            <img
                [src]="location.image"
                [alt]="location.location">

            <div>

                <p>{{ location.longDescription }}</p>
                <p><u>Adresse:</u><br>{{ location.address }}</p>
                
            </div>

        </div>

    </div>

</section>
