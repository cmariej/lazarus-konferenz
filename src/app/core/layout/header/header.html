<header [class.scrolled]="scrolled()">

    <div class="container navbar">

        <a class="logo" routerLink="/">

            <span>

                <img src="images/logo.svg" alt="Lazarus Konferenz" width="45" height="45">

            </span>

            <div>

                <strong>Lazarus</strong>

                <small>Konferenz {{ general.year }}</small>

            </div>

        </a>

        <app-navigation class="desktop-nav" [items]="navigation">
        </app-navigation>

        <a class="ticket-button"
            href="https://eventfrog.de/de/p/wissenschaft-und-technik/lazaruskonferenz-2026-7418767730667484008.html"
            target="_blank" rel="noopener noreferrer">

            Tickets

        </a>

        <button class="burger" type="button" (click)="toggleMenu()">

            ☰

        </button>

    </div>

    @if (mobileMenuOpen()) {

    <div class="mobile-menu">

        <app-navigation [items]="navigation" [mobile]="true">
        </app-navigation>

    </div>

    }

</header>
