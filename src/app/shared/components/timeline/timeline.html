<div class="timeline-item">

    <div class="year">

        {{ year() }}

    </div>

    <div class="image">

        <img
            [src]="image()"
            [alt]="title()">

    </div>

    <div class="content">

        <h3>{{ title() }}</h3>

        <p>{{ text() }}</p>

    </div>

</div>
